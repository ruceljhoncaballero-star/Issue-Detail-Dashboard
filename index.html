<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACCOR DASHBOARD</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,sans-serif}
body{display:flex;height:100vh;overflow:hidden;background:#f0f0f0}
.sidebar{width:160px;min-width:160px;background:#1a1a2e;color:#fff;display:flex;flex-direction:column;z-index:10}
.sidebar .logo{text-align:center;padding:14px 10px 18px;font-weight:700;font-size:18px;color:#9D833E;letter-spacing:2px;border-bottom:1px solid #333}
.sidebar .nav-item{display:flex;align-items:center;gap:10px;padding:14px 18px;cursor:pointer;transition:background .2s;font-size:13px;border-left:4px solid transparent}
.sidebar .nav-item:hover,.sidebar .nav-item.active{background:#16213e;border-left:4px solid #9D833E}
.sidebar .nav-item svg{width:18px;height:18px;fill:#ccc}
.sidebar .nav-item.active svg{fill:#9D833E}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#fff;border-bottom:1px solid #ddd;padding:10px 24px;display:flex;align-items:center;justify-content:space-between;min-height:50px}
.topbar h1{font-size:20px;color:#1a1a2e;font-weight:700}
.upload-area{display:flex;align-items:center;gap:8px}
.upload-trigger{cursor:pointer;font-size:20px;padding:4px 10px;border-radius:6px;transition:all .3s;opacity:0.15}
.upload-trigger:hover{background:#f5f0e0;opacity:1}
.upload-controls{display:flex;align-items:center;gap:8px;opacity:0;max-width:0;overflow:hidden;transition:all .3s;white-space:nowrap}
.upload-area:hover .upload-controls{opacity:1;max-width:700px}
.upload-area:hover .upload-trigger{opacity:1}
.file-status{font-size:12px;color:#666}
.remove-btn{font-size:11px;padding:3px 10px;border:1px solid #ddd;border-radius:4px;cursor:pointer;background:#fff;color:#c00;display:none}
.remove-btn:hover{background:#fee;border-color:#c00}
.datetime-bar{background:#faf8f2;border-bottom:1px solid #e8e0c8;padding:6px 24px;font-size:13px;color:#555}
.content{flex:1;overflow-y:auto;padding:16px 20px;background:#f5f5f5}
.tab-content{display:none}.tab-content.active{display:block}
.cards-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.card{background:#fff;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,.06);padding:14px 18px;flex:1;min-width:150px;border-left:4px solid #9D833E}
.card .card-label{font-size:10px;color:#888;text-transform:uppercase;font-weight:600}
.card .card-value{font-size:20px;font-weight:700;color:#1a1a2e;margin-top:3px}
.card.c1{border-left-color:#9D833E}.card.c2{border-left-color:#2BBCB3}.card.c3{border-left-color:#f44336}.card.c4{border-left-color:#4CAF50}.card.c5{border-left-color:#FF9800}
.charts-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.chart-box{background:#fff;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,.06);padding:12px;flex:1;min-width:250px;max-height:300px;overflow:hidden}
.chart-box canvas{max-height:240px!important}
.chart-box h3{font-size:12px;color:#333;margin-bottom:6px;font-weight:700}
.logo-row{display:flex;align-items:center;justify-content:center;gap:30px;margin-bottom:16px;padding:14px 20px;background:#fff;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,.06)}
.logo-row img{height:60px;object-fit:contain}
.logo-row .dash-title{font-size:22px;font-weight:700;color:#1a1a2e;letter-spacing:1px}
.table-container{background:#fff;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,.06);overflow:auto;max-height:calc(100vh - 280px)}
.table-container table{width:100%;border-collapse:collapse;font-size:11px;table-layout:fixed}
.table-container th{background:#9D833E;color:#fff;padding:7px 6px;text-align:left;position:sticky;top:0;z-index:2;cursor:col-resize;white-space:nowrap;font-size:11px;resize:horizontal;overflow:auto;min-width:30px}
.table-container th::-webkit-resizer{background:transparent}
.table-container th:hover{background:#8a7235}
.table-container td{padding:5px 6px;border-bottom:1px solid #eee;white-space:normal;word-wrap:break-word}
.table-container tr:nth-child(even){background:#fafaf5}
.table-container tr:hover{background:#f5f0e0 !important}
.info-line{font-size:12px;color:#666;margin-bottom:8px;padding:7px 12px;background:#fff;border-radius:8px;border-left:4px solid #9D833E}
.aging-bar .ab{font-size:10px;padding:3px 8px;border-radius:4px;color:#fff;font-weight:600;margin:0 2px}
.cat-table{width:100%;border-collapse:collapse;font-size:11px;table-layout:auto}
.cat-table th{background:#9D833E;color:#fff;padding:7px 6px;text-align:left;font-size:11px;position:sticky;top:0;z-index:2;white-space:nowrap;resize:horizontal;overflow:auto;min-width:30px;cursor:col-resize}
.cat-table th::-webkit-resizer{background:transparent}
.cat-table td{padding:5px 6px;border-bottom:1px solid #e0dcc8;font-size:11px;white-space:normal;word-wrap:break-word}
.cat-table tr:nth-child(even){background:#f9f7f0}
.cat-table tr:hover{background:#f0ead5}
.cat-table .grand-total td{background:#9D833E;color:#fff;font-weight:700}
.cat-link{color:#1565C0;text-decoration:none;font-weight:600;cursor:pointer}
.cat-link:hover{text-decoration:underline}
.editable-cell{background:#fffde7;border:1px dashed #ccc;min-width:60px;padding:4px 5px;cursor:text;outline:none;border-radius:3px;font-size:10px;white-space:normal}
.editable-cell:focus{border-color:#9D833E;background:#fff9c4}
.section-title{font-size:16px;font-weight:700;color:#1a1a2e;margin-bottom:3px}
.section-sub{font-size:11px;color:#888;margin-bottom:8px}
.filter-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.filter-row label{font-size:12px;font-weight:600;color:#555}
.no-data{text-align:center;padding:60px;color:#aaa;font-size:15px}
.ms-wrap{position:relative;display:inline-block;min-width:180px}
.ms-btn{padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-size:12px;background:#fff;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:6px;min-width:180px}
.ms-btn:hover{border-color:#9D833E}
.ms-panel{display:none;position:absolute;top:100%;left:0;background:#fff;border:1px solid #ddd;border-radius:6px;box-shadow:0 4px 12px rgba(0,0,0,.1);z-index:100;min-width:240px;max-height:260px;overflow-y:auto;padding:4px 0}
.ms-panel.open{display:block}
.ms-panel label{display:flex;align-items:center;gap:6px;padding:3px 10px;font-size:11px;cursor:pointer}
.ms-panel label:hover{background:#f5f0e0}
.ms-panel input[type=checkbox]{accent-color:#9D833E}
.ms-actions{display:flex;gap:4px;padding:4px 8px;border-bottom:1px solid #eee;margin-bottom:3px}
.ms-actions button{padding:2px 8px;font-size:10px;border:1px solid #ddd;border-radius:3px;cursor:pointer;background:#fff}
.ms-actions button:hover{background:#f5f0e0}
.pct-bar{display:flex;align-items:center;gap:4px}
.pct-bar-bg{width:50px;height:12px;background:#eee;border-radius:6px;overflow:hidden}
.pct-bar-fill{height:100%;border-radius:6px}
.pct-bar-text{font-size:10px;font-weight:600}
.status-paid{background:#4CAF50;color:#fff;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600}
.status-partial{background:#FF9800;color:#fff;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600}
.status-unpaid{background:#f44336;color:#fff;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600}
.client-table th{background:#1565C0;color:#fff;resize:horizontal;overflow:auto;cursor:col-resize}.client-table th:hover{background:#0D47A1}
.client-table th::-webkit-resizer{background:transparent}
.pareto-tag{margin-left:6px;padding:3px 8px;background:#9D833E;color:#fff;border-radius:8px;font-size:10px;font-weight:600;display:inline-flex;align-items:center;gap:4px}
.pareto-tag a{color:#fff;cursor:pointer;text-decoration:none;font-size:12px}
.ag-cur{background:#E8F5E9!important}.ag-030{background:#FFF8E1!important}.ag-3160{background:#FFF3E0!important}
.ag-6190{background:#FFE0B2!important}.ag-91120{background:#FDDCB5!important}.ag-120p{background:#F8C4A4!important}
.th-cur{background:#6d9b3a!important;color:#fff!important}.th-030{background:#a89040!important;color:#fff!important}.th-3160{background:#b08a38!important;color:#fff!important}
.th-6190{background:#c07830!important;color:#fff!important}.th-91120{background:#c06848!important;color:#fff!important}.th-120p{background:#b05840!important;color:#fff!important}
.status-cell{padding:4px 8px;border-radius:4px;font-size:10px;font-weight:600;color:#fff;display:inline-block;white-space:normal;word-wrap:break-word;max-width:100%}
</style>
</head>
<body>
<div class="sidebar">
 <div class="logo">ACCOR</div>
 <div class="nav-item active" onclick="switchTab('home',this)"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg> HOME</div>
 <div class="nav-item" onclick="switchTab('dashboard',this)"><svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg> DASHBOARD</div>
 <div class="nav-item" onclick="switchTab('category',this)"><svg viewBox="0 0 24 24"><path d="M17.63 5.84C17.27 5.33 16.67 5 16 5L5 5.01C3.9 5.01 3 5.9 3 7v10c0 1.1.9 1.99 2 1.99L16 19c.67 0 1.27-.33 1.63-.84L22 12l-4.37-6.16z"/></svg> CATEGORY</div>
 <div class="nav-item" onclick="switchTab('clients',this)"><svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg> CLIENTS</div>
 <div class="nav-item" onclick="switchTab('invoices',this)"><svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg> INVOICES</div>
</div>
<div class="main">
 <div class="topbar">
  <h1>ACCOR DASHBOARD</h1>
  <div class="upload-area">
   <div class="upload-trigger" title="Upload">&#128193;</div>
   <div class="upload-controls">
    <input type="file" id="fileInput" accept=".xlsx,.xlsm,.xls" onchange="handleFile(event)">
    <span class="file-status" id="fileStatus"></span>
    <button class="remove-btn" id="removeBtn" onclick="removeFile()">&#10005; Remove</button>
   </div>
  </div>
 </div>
 <div class="datetime-bar" id="datetimeBar"></div>
 <div class="content">
  <div class="tab-content active" id="tab-home">
   <div class="logo-row" id="logoRow"></div>
   <div id="homeCards" class="cards-row"><div class="no-data">Upload a workbook to view the dashboard.</div></div>
  </div>
  <div class="tab-content" id="tab-dashboard"><div id="dashCards" class="cards-row"></div><div id="dashCharts" class="charts-row"></div></div>
  <div class="tab-content" id="tab-category"><div id="categoryContent"><div class="no-data">Upload a workbook to view categories.</div></div></div>
  <div class="tab-content" id="tab-clients"><div id="clientsContent"><div class="no-data">Upload a workbook to view clients.</div></div></div>
  <div class="tab-content" id="tab-invoices"><div id="invoicesContent"><div class="no-data">Upload a workbook to view invoices.</div></div></div>
 </div>
</div>
<script>
try{Chart.register(ChartDataLabels);}catch(e){}
var workingData=[];var locationMap={};var chartInstances=[];var invMSRef=null;var invParetoMSRef=null;var currentParetoFilter='';
var PUB_LOGO='https://www.publicisresources.com/wp-content/uploads/2023/01/ResourcesLogo-sq@2x.png';
var ZEN_LOGO='https://mumbrella.com.au/wp-content/uploads/2017/05/Zenith.png';
var paidParetos={"Paid":1,"Collected":1,"Cleared":1};
var agColors=['#8BC34A','#C8A951','#D4A34A','#E8963C','#E8825A','#D46B5A'];
var statusColors={"Collected":"#4CAF50","Paid":"#4CAF50","Cleared":"#9E9E9E","Client Pending":"#FF9800","For Payment":"#2196F3","Client Unresponsive":"#f44336","For Cancellation":"#e91e63","Disputed Invoice":"#795548","Pending Copy of Contract / SOW":"#009688","Pending Documents":"#607D8B","Pending Request":"#FF5722","CN Issuance":"#9C27B0","CN not Shared":"#673AB7","AB Linking":"#3F51B5","Refuse to Pay":"#B71C1C"};
var actionMap={"AB Linking":{action:"Coordinate with agency to confirm if actual invoices are for offset against Advance Billing before issuance of SOA.",owner:"Faraz (Agency) / Tosef",timeline:"Within the month"},"Client Unresponsive":{action:"Continuous follow-up with client via email and call. Escalate to Account Manager if no response.",owner:"Collector / Anita / Reda",timeline:"Weekly"},"CN Issuance":{action:"Request issuance of Credit Note from billing team.",owner:"Billing Team (Faraz / Kevin)",timeline:"Within 7-15 days"},"CN not Shared":{action:"Request the Agency to raise new invoice to offset existing CN.",owner:"Faraz (Agency)",timeline:"Within the month"},"Disputed Invoice":{action:"Coordinate with billing team and client to resolve dispute.",owner:"Faraz / Kevin (Billing)",timeline:"Within 30 days"},"For Cancellation":{action:"Process cancellation of invoice due to PO issue.",owner:"Faraz (Agency) / Billing Team",timeline:"Within the month"},"Pending Copy of Contract / SOW":{action:"Request copy of Contract / SOW from responsible team.",owner:"Tosef / Hadi",timeline:"Within 15 days"},"Pending Documents":{action:"Request supporting documents from client.",owner:"Faraz / Kevin",timeline:"Within 15 days"},"Pending Request":{action:"Follow up on pending requests with client / internal team.",owner:"Jeffrey Saade / Tosef",timeline:"Within 7 days"},"Refuse to Pay":{action:"Escalate to Account Manager and Corporate POC.",owner:"Anita / Reda / Account Manager",timeline:"30 to 60 days"},"Client Pending":{action:"Follow up with client for pending confirmation.",owner:"Collector",timeline:"Within 7 days"},"For Payment":{action:"Monitor and follow up on payment processing.",owner:"Collector",timeline:"Weekly"},"Paid":{action:"Payment received. Verify and reconcile.",owner:"Collector",timeline:"Completed"},"Cleared":{action:"Invoice cleared. No further action.",owner:"-",timeline:"Completed"}};

function updateDateTime(){var now=new Date();var days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];var months=['January','February','March','April','May','June','July','August','September','October','November','December'];document.getElementById('datetimeBar').innerHTML='&#128197; '+days[now.getDay()]+', '+months[now.getMonth()]+' '+now.getDate()+', '+now.getFullYear()+' &nbsp;|&nbsp; &#128336; '+now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});}
updateDateTime();setInterval(updateDateTime,1000);

function switchTab(id,el){var t=document.querySelectorAll('.tab-content');for(var i=0;i<t.length;i++)t[i].classList.remove('active');var n=document.querySelectorAll('.nav-item');for(var i=0;i<n.length;i++)n[i].classList.remove('active');document.getElementById('tab-'+id).classList.add('active');if(el){el.classList.add('active');}else{var all=document.querySelectorAll('.nav-item');for(var i=0;i<all.length;i++){if(all[i].textContent.trim().toUpperCase()===id.toUpperCase()){all[i].classList.add('active');break;}}}}

function num(v){return typeof v==='number'?v:(parseFloat(String(v).replace(/,/g,''))||0);}
function fmt(v){return num(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtInt(v){return Math.round(num(v)).toLocaleString('en-US');}
function fmtOrBlank(v){var n2=num(v);return n2===0?'':fmt(n2);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function formatDate(v){if(!v)return '';if(typeof v==='number'){var d=new Date(Math.round((v-25569)*86400*1000));return String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0')+'/'+d.getFullYear();}try{var d2=new Date(v);if(!isNaN(d2))return String(d2.getMonth()+1).padStart(2,'0')+'/'+String(d2.getDate()).padStart(2,'0')+'/'+d2.getFullYear();}catch(e){}return String(v);}
function destroyCharts(){for(var i=0;i<chartInstances.length;i++){try{chartInstances[i].destroy();}catch(e){}}chartInstances=[];}
function statusCell(s){if(!s||s===''||s==='#N/A')return '';var bg=statusColors[s]||'#607D8B';return '<span class="status-cell" style="background:'+bg+'">'+esc(s)+'</span>';}

function createMultiSelect(cid,opts,onChange,ph){
 var wrap=document.getElementById(cid);if(!wrap)return{getSelected:function(){return[];}};
 var btn=document.createElement('div');btn.className='ms-btn';btn.innerHTML='<span>'+ph+'</span><span style="font-size:9px;color:#888">&#9660;</span>';
 var panel=document.createElement('div');panel.className='ms-panel';
 var acts=document.createElement('div');acts.className='ms-actions';
 var sa=document.createElement('button');sa.textContent='All';var da=document.createElement('button');da.textContent='None';
 acts.appendChild(sa);acts.appendChild(da);panel.appendChild(acts);
 var cbs=[];for(var i=0;i<opts.length;i++){var lbl=document.createElement('label');var cb=document.createElement('input');cb.type='checkbox';cb.checked=true;cb.value=opts[i];lbl.appendChild(cb);lbl.appendChild(document.createTextNode(' '+opts[i]));panel.appendChild(lbl);cbs.push(cb);cb.addEventListener('change',function(){ub();if(onChange)onChange(gs());});}
 wrap.innerHTML='';wrap.className='ms-wrap';wrap.appendChild(btn);wrap.appendChild(panel);
 btn.addEventListener('click',function(e){e.stopPropagation();panel.classList.toggle('open');});
 document.addEventListener('click',function(e){if(!wrap.contains(e.target))panel.classList.remove('open');});
 sa.addEventListener('click',function(){for(var j=0;j<cbs.length;j++)cbs[j].checked=true;ub();if(onChange)onChange(gs());});
 da.addEventListener('click',function(){for(var j=0;j<cbs.length;j++)cbs[j].checked=false;ub();if(onChange)onChange(gs());});
 function gs(){var s=[];for(var j=0;j<cbs.length;j++){if(cbs[j].checked)s.push(cbs[j].value);}return s;}
 function ub(){var s=gs();if(s.length===opts.length)btn.querySelector('span').textContent=ph+' (All)';else if(s.length===0)btn.querySelector('span').textContent=ph+' (None)';else btn.querySelector('span').textContent=ph+' ('+s.length+')';}
 ub();return{getSelected:gs};
}

function handleFile(e){
 var file=e.target.files[0];if(!file)return;
 var reader=new FileReader();
 reader.onload=function(ev){
  try{var data=new Uint8Array(ev.target.result);var wb=XLSX.read(data,{type:'array'});
   var ws=wb.Sheets['Working File'];if(!ws){alert('Sheet "Working File" not found!');return;}
   workingData=XLSX.utils.sheet_to_json(ws,{defval:''});
   locationMap={};var cls=wb.Sheets['Clients List']||wb.Sheets['Client List'];
   if(cls){var cd=XLSX.utils.sheet_to_json(cls,{defval:''});for(var i=0;i<cd.length;i++){var cn=String(cd[i]['Client Number']||'').trim();if(cn)locationMap[cn]=cd[i]['Location']||'';}}
   document.getElementById('fileStatus').innerHTML='&#9989; '+esc(file.name)+' &mdash; '+workingData.length+' rows';
   document.getElementById('removeBtn').style.display='inline-block';
   renderAll();
  }catch(err){alert('Error: '+err.message);}
 };reader.readAsArrayBuffer(file);
}

function removeFile(){
 workingData=[];locationMap={};currentParetoFilter='';destroyCharts();
 document.getElementById('fileInput').value='';document.getElementById('fileStatus').innerHTML='';document.getElementById('removeBtn').style.display='none';
 document.getElementById('homeCards').innerHTML='<div class="no-data">Upload a workbook to view the dashboard.</div>';
 document.getElementById('dashCards').innerHTML='';document.getElementById('dashCharts').innerHTML='';
 document.getElementById('categoryContent').innerHTML='<div class="no-data">Upload a workbook to view categories.</div>';
 document.getElementById('clientsContent').innerHTML='<div class="no-data">Upload a workbook to view clients.</div>';
 document.getElementById('invoicesContent').innerHTML='<div class="no-data">Upload a workbook to view invoices.</div>';
}

function renderAll(){destroyCharts();renderLogos();renderHome();renderDashboard();renderCategory();renderClients();renderInvoices();}

function renderLogos(){
 document.getElementById('logoRow').innerHTML='<img src="'+PUB_LOGO+'" alt="Publicis RE:SOURCES" onerror="this.outerHTML=\'<span style=font-weight:700;font-size:14px;color:#9D833E>PUBLICIS RE:SOURCES</span>\'"><span class="dash-title">ACCOR DASHBOARD</span><img src="'+ZEN_LOGO+'" alt="Zenith" onerror="this.outerHTML=\'<span style=font-weight:700;font-size:14px;color:#3C3C3C>Zenith - The ROI Agency</span>\'">';
}

function renderHome(){
 var d=workingData;var ns={};for(var i=0;i<d.length;i++){if(d[i]['Name'])ns[d[i]['Name']]=1;}
 var uc=Object.keys(ns).length,ti=0,tos=0,tc=0;
 for(var i=0;i<d.length;i++){if(d[i]['Accounting Doc Number'])ti++;tos+=num(d[i]['Remaining Amount']);tc+=num(d[i]['Current']);}
 document.getElementById('homeCards').innerHTML=
  '<div class="card c1"><div class="card-label">Total Clients</div><div class="card-value">'+uc+'</div></div>'+
  '<div class="card c2"><div class="card-label">Total Invoices</div><div class="card-value">'+fmtInt(ti)+'</div></div>'+
  '<div class="card c3"><div class="card-label">Total Outstanding</div><div class="card-value">'+fmt(tos)+'</div></div>'+
  '<div class="card c4"><div class="card-label">Total Current</div><div class="card-value">'+fmt(tc)+'</div></div>'+
  '<div class="card c5"><div class="card-label">Total Overdue</div><div class="card-value">'+fmt(tos-tc)+'</div></div>';
}

function renderDashboard(){

function filterInvFull(){
 var sel=invMSRef?invMSRef.getSelected():[];
 var psel=invParetoMSRef?invParetoMSRef.getSelected():[];
 var searchEl=document.getElementById('invSearch');var q=searchEl?searchEl.value.toLowerCase():'';
 var ta=0;for(var i=0;i<workingData.length;i++){if(String(workingData[i]['Client Number']||'').trim()!=='')ta+=num(workingData[i]['Remaining Amount']);}
 var cnt=0,sub=0;var rows=document.querySelectorAll('#invTbody .inv-row');
 for(var i=0;i<rows.length;i++){
  var n=rows[i].getAttribute('data-name');var pr=rows[i].getAttribute('data-pareto');
  var mc=(sel.length===0||sel.indexOf(n)>=0);
  var ms=rows[i].textContent.toLowerCase().indexOf(q)>=0;
  var mp=(!currentParetoFilter||pr===currentParetoFilter);
  var mpp=(psel.length===0||psel.indexOf(pr)>=0);
  var show=mc&&ms&&mp&&mpp;
  rows[i].style.display=show?'':'none';
  if(show){cnt++;sub+=parseFloat(rows[i].getAttribute('data-amt'))||0;}
 }
 var infoSpan=document.querySelector('#invInfo span');
 if(infoSpan)infoSpan.innerHTML='Showing <b>'+cnt+'</b> of <b>'+rows.length+'</b> invoices | Subtotal: <b>'+fmt(sub)+'</b> | Total: <b>'+fmt(ta)+'</b>';
 updateInvAging();
}

function updateInvAging(){
 var rows=document.querySelectorAll('#invTbody .inv-row');var sc=0,s0=0,s31=0,s61=0,s91=0,s120=0;
 for(var i=0;i<rows.length;i++){if(rows[i].style.display==='none')continue;sc+=parseFloat(rows[i].getAttribute('data-cur'))||0;s0+=parseFloat(rows[i].getAttribute('data-030'))||0;s31+=parseFloat(rows[i].getAttribute('data-3160'))||0;s61+=parseFloat(rows[i].getAttribute('data-6190'))||0;s91+=parseFloat(rows[i].getAttribute('data-91120'))||0;s120+=parseFloat(rows[i].getAttribute('data-120p'))||0;}
 var el=document.getElementById('invAgingInline');
 if(el)el.innerHTML='<span style="font-size:11px;font-weight:600">Total: </span><span class="ab" style="background:#8BC34A">'+fmt(sc)+'</span><span class="ab" style="background:#C8A951">'+fmt(s0)+'</span><span class="ab" style="background:#D4A34A">'+fmt(s31)+'</span><span class="ab" style="background:#E8963C">'+fmt(s61)+'</span><span class="ab" style="background:#E8825A">'+fmt(s91)+'</span><span class="ab" style="background:#D46B5A">'+fmt(s120)+'</span>';
}

var invSD={};function sortInv(col){invSD[col]=!invSD[col];var tb=document.getElementById('invTbody');var rs=Array.from(tb.querySelectorAll('tr'));var asc=invSD[col];rs.sort(function(a,b){var va=a.children[col].textContent.trim(),vb=b.children[col].textContent.trim();var na=parseFloat(va.replace(/,/g,'')),nb=parseFloat(vb.replace(/,/g,''));if(!isNaN(na)&&!isNaN(nb))return asc?na-nb:nb-na;return asc?va.localeCompare(vb):vb.localeCompare(va);});for(var i=0;i<rs.length;i++){rs[i].children[0].textContent=i+1;tb.appendChild(rs[i]);}}
</script>
