  firebase.initializeApp(firebaseConfig);
  var fbDB = firebase.database();
  var FB_EDITS_PATH = 'categoryEdits';
  var FB_COL_NAMES = ['actionItems','actionOwner','timeline','agencyComments'];
  var FB_SHARED_PATH = 'sharedData';
  var _fbSharedListenerSet = false;
  function sanitizeKey(s) {
    return String(s || '').replace(/[.#$\[\]\/]/g, '_').replace(/\s+/g, '_');
  }
  function fbSave(pareto, colIdx, value) {
    var key = sanitizeKey(pareto);
    if (!key) return;
    fbDB.ref(FB_EDITS_PATH + '/' + key + '/' + FB_COL_NAMES[colIdx]).set(value || '');
  }
  function fbListenAll(callback) {
    fbDB.ref(FB_EDITS_PATH).on('value', function(snap) {
      callback(snap.val() || {});
    });
  }
  function fbClearAll() {
    fbDB.ref(FB_EDITS_PATH).remove();
  }
  function fbSaveSharedData(wd, lm, fName) {
    var payload = {
      workingData: JSON.stringify(wd),
      locationMap: JSON.stringify(lm),
      fileName: fName,
      uploadedAt: Date.now(),
      codeVersion: CODE_VERSION || 5
    };
    fbDB.ref(FB_SHARED_PATH).set(payload);
  }
  function fbLoadSharedData(callback) {
    fbDB.ref(FB_SHARED_PATH).once('value', function(snap) {
      callback(snap.val() || null);
    });
  }
  function fbListenSharedData(callback) {
    if (_fbSharedListenerSet) return;
    _fbSharedListenerSet = true;
    var _lastUpload = 0;
    fbDB.ref(FB_SHARED_PATH).on('value', function(snap) {
      var val = snap.val() || null;
      if (val && val.uploadedAt && val.uploadedAt !== _lastUpload) {
        _lastUpload = val.uploadedAt;
        callback(val);
      }
    });
  }
  function fbRemoveSharedData() {
    fbDB.ref(FB_SHARED_PATH).remove();
  }
</script>

function showSuggest(){
 var sg=document.getElementById('searchSuggest');if(!sg)return;
 var q=(document.getElementById('invSearch')||{}).value||'';q=q.trim().toLowerCase();
 if(q.length<1){sg.classList.remove('open');sg.innerHTML='';return;}
 var seen={},hits=[],bc={'Client':'#9D833E','Doc#':'#4285F4','Ref#':'#2BBCB3','Text':'#607D8B'};
 workingData.forEach(function(r){
  var pairs=[['Client',r['Name']||''],['Doc#',String(r['Accounting Doc Number']||'')],['Ref#',String(r['Ref Doc Number']||'')],['Text',r['Text']||'']];
  pairs.forEach(function(p){var t=p[0],v=p[1];if(v&&!seen[t+v]&&v.toLowerCase().indexOf(q)>=0){seen[t+v]=1;hits.push({v:v,t:t});}});
 });
 hits=hits.slice(0,12);
 if(!hits.length){sg.classList.remove('open');sg.innerHTML='';return;}
 sg.innerHTML=hits.map(function(h){return '<div data-val="'+esc(h.v)+'" onclick="pickSuggest(this)" style="display:flex;align-items:center;gap:6px;cursor:pointer"><span style="display:inline-block;background:'+(bc[h.t]||'#607D8B')+';color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;min-width:32px;text-align:center">'+h.t+'</span>'+esc(h.v)+'</div>';}).join('');
 sg.classList.add('open');
}
function pickSuggest(el){
 document.getElementById('invSearch').value=el.getAttribute('data-val')||el.textContent;
 document.getElementById('searchSuggest').classList.remove('open');
 filterInvFull();
}
document.addEventListener('click',function(e){var sg=document.getElementById('searchSuggest');if(sg&&!sg.parentElement.contains(e.target))sg.classList.remove('open');});

</script>

function openIDB(cb) {
  var req = indexedDB.open(DB_NAME, 1);
  req.onupgradeneeded = function(e) { e.target.result.createObjectStore(DB_STORE); };
  req.onsuccess = function(e) { cb(e.target.result); };
  req.onerror = function() { console.warn('IDB open error'); };
}
function saveToIDB(rawBuf, parsedWorking, parsedLocation, fileName, codeVer) {
  openIDB(function(db) {
    var tx = db.transaction(DB_STORE, 'readwrite');
    tx.objectStore(DB_STORE).put({rawBuffer: rawBuf, workingData: JSON.stringify(parsedWorking), locationMap: JSON.stringify(parsedLocation), fileName: fileName, codeVersion: codeVer}, DB_KEY);
  });
}
function loadFromIDB(cb) {
  openIDB(function(db) {
    var tx = db.transaction(DB_STORE, 'readonly');
    var req = tx.objectStore(DB_STORE).get(DB_KEY);
    req.onsuccess = function() { cb(req.result || null); };
    req.onerror = function() { cb(null); };
  });
}
function clearIDB() {
  openIDB(function(db) {
    var tx = db.transaction(DB_STORE, 'readwrite');
    tx.objectStore(DB_STORE).delete(DB_KEY);
  });
}
function parseWorkbook(arrayBuf, fileName) {
  var data = new Uint8Array(arrayBuf);
  var wb = XLSX.read(data, {type:'array'});
  var ws = null, usedSheet = '';
  ['Working File','working file','Consolidated SOA','Accor Working File'].forEach(function(n) {
    if (!ws && wb.Sheets[n]) { ws = wb.Sheets[n]; usedSheet = n; }
  });
  if (!ws) { wb.SheetNames.forEach(function(n) {
    var nl = n.trim().toLowerCase();
    if (!ws && (nl.indexOf('working') >= 0 || nl.indexOf('consolidated') >= 0)) { ws = wb.Sheets[n]; usedSheet = n; }
  }); }
  if (!ws && wb.SheetNames.length > 0) {
    var _best = null, _bestC = 0;
    wb.SheetNames.forEach(function(n) {
      var ref = wb.Sheets[n]['!ref'];
      if (ref) { var m = ref.match(/([A-Z]+)\d+$/); if (m) { var c = 0; for (var i = 0; i < m[1].length; i++) c = c * 26 + (m[1].charCodeAt(i) - 64); if (c > _bestC) { _bestC = c; _best = n; } } }
    });
    if (_best) { usedSheet = _best; ws = wb.Sheets[usedSheet]; }
  }
  if (!ws) return null;
  var wd = XLSX.utils.sheet_to_json(ws, {defval: ''});
  wd = wd.map(function(r) { var nr = {}; Object.keys(r).forEach(function(k) { nr[k.trim()] = r[k]; }); return nr; });
  var _sc = '';
  if (wd.length > 0) { Object.keys(wd[0]).forEach(function(k) { var kl = k.toLowerCase(); if (kl.indexOf('status') >= 0 && kl.indexOf('account') < 0) _sc = k; }); }
  if (_sc) wd.forEach(function(r) { r['Status'] = r[_sc]; });
  wd = wd.filter(function(r) { var d = String(r['Accounting Doc Number'] || '').trim(); return d !== '' && d !== '0'; });
  var lm = {};
  var cls = wb.Sheets['Clients List'] || wb.Sheets['Client List'] || wb.Sheets['client list'];
  if (cls) {
    XLSX.utils.sheet_to_json(cls, {defval: ''}).map(function(r) { var nr = {}; Object.keys(r).forEach(function(k) { nr[k.trim()] = r[k]; }); return nr; }).forEach(function(r) {
      var cn = String(r['Client Code'] || r['Client Number'] || '').trim();
      if (cn) lm[cn] = r['Location'] || '';
    });
  }
  return { workingData: wd, locationMap: lm, usedSheet: usedSheet };
}

var catSD = {};

function sortCategory(colIdx) {
    var tbody = document.getElementById('catTbody');
    if (!tbody) return;
    catSD[colIdx] = (catSD[colIdx] === 'asc') ? 'desc' : 'asc';
    var dir = catSD[colIdx];
    var rows = Array.from(tbody.querySelectorAll('tr.cat-row'));
    var grandRow = tbody.querySelector('tr.grand-total-row');
    if (!grandRow) {
        var allRows = tbody.querySelectorAll('tr');
        var last = allRows[allRows.length - 1];
        if (last && !last.classList.contains('cat-row')) grandRow = last;
    }
    rows.sort(function(a, b) {
        var cellA = a.cells[colIdx] ? a.cells[colIdx].textContent.trim() : '';
        var cellB = b.cells[colIdx] ? b.cells[colIdx].textContent.trim() : '';
        if (colIdx >= 1 && colIdx <= 7) {
            var nA = parseFloat(cellA.replace(/,/g, '')) || 0;
            var nB = parseFloat(cellB.replace(/,/g, '')) || 0;
            return dir === 'asc' ? nA - nB : nB - nA;
        }
        return dir === 'asc' ? cellA.localeCompare(cellB) : cellB.localeCompare(cellA);
    });
    rows.forEach(function(r) { tbody.appendChild(r); });
    if (grandRow) tbody.appendChild(grandRow);
    // update arrows
    var tbl = tbody.closest('table');
    if (tbl) {
        var ths = tbl.querySelectorAll('thead th');
        ths.forEach(function(th, i) {
            th.innerHTML = th.innerHTML.replace(/ [▲▼]/g, '');
            if (i === colIdx) th.innerHTML += (dir === 'asc' ? ' ▲' : ' ▼');
        });
    }
}

function handleMassUpdate(e){
  var file=e.target.files[0];if(!file)return;
  if(!workingData.length){alert('Please upload the main file first.');return;}
  showLoading('Reading update file...');
  var reader=new FileReader();
  reader.onload=function(ev){
    setTimeout(function(){
    try{

      var wb=XLSX.read(data,{type:'array'});

      var ws=null,usedSheet='';
      ['Working File','working file','Consolidated SOA','Accor Working File'].forEach(function(n){if(!ws&&wb.Sheets[n]){ws=wb.Sheets[n];usedSheet=n;}});

        if(_best){usedSheet=_best;ws=wb.Sheets[usedSheet];}
      }
      if(!ws&&wb.SheetNames.length>0){usedSheet=wb.SheetNames[0];ws=wb.Sheets[usedSheet];}

      if(!updateRows.length){hideLoading();alert('Update file has no data rows.');return;}

      if(_sc&&_sc!=='Status')updateRows.forEach(function(r){r['Status']=r[_sc];});
      showLoading('Auto-detecting match columns...');
      /* === FULLY NAME-AGNOSTIC: scan ALL cols in both files, find best overlap === */
      var wdColVals={};
      var wdCols=workingData.length>0?Object.keys(workingData[0]):[];
      wdCols.forEach(function(col){
        var vals={},cnt=0;
        var sample=Math.min(workingData.length,500);
        for(var i=0;i<sample;i++){
          var v=String(workingData[i][col]||'').trim();
          if(v&&v!=='0'&&v!=='undefined'&&v.length>0&&v.length<80){if(!vals[v]){vals[v]=1;cnt++;}}
        }
        if(cnt>=2&&cnt<=sample*0.95) wdColVals[col]=vals;
      });
      var bestPair=null,bestHits=0,allPairs=[];
      if(updateRows.length>0){
        var upCols=Object.keys(updateRows[0]);
        upCols.forEach(function(uCol){
          Object.keys(wdColVals).forEach(function(wCol){
            var hits=0,sample2=Math.min(updateRows.length,300);
            for(var i=0;i<sample2;i++){
              var v=String(updateRows[i][uCol]||'').trim();
              if(v&&wdColVals[wCol][v])hits++;
            }
            if(hits>0)allPairs.push({uCol:uCol,wCol:wCol,hits:hits});
            if(hits>bestHits){bestHits=hits;bestPair={uCol:uCol,wCol:wCol,hits:hits};}
          });
        });
      }
      var secPair=null;
      if(bestPair){
        allPairs.sort(function(a,b){return b.hits-a.hits;});
        for(var p=0;p<allPairs.length;p++){
          if(allPairs[p].wCol!==bestPair.wCol&&allPairs[p].uCol!==bestPair.uCol){secPair=allPairs[p];break;}

      var allowCols={'Pareto':1,'Status':1};
      if(_sc&&_sc!=='Status')allowCols[_sc]=1;
      if(updateRows.length>0){Object.keys(updateRows[0]).forEach(function(k){var kl=k.toLowerCase();if(kl.indexOf('pareto')>=0)allowCols[k]=1;if(kl.indexOf('status')>=0&&kl.indexOf('account')<0)allowCols[k]=1;});}
      function mergeRow(target,src){
        var changed=false;
        Object.keys(src).forEach(function(k){if(!allowCols[k])return;var v=src[k];if(v===''||v===null||v===undefined)return;if(String(v).trim()==='')return;target[k]=v;changed=true;});
        return changed;
      }
      var lookupPrimary={},lookupSecondary={};
      if(bestPair){
        updateRows.forEach(function(r){
          var pk=String(r[bestPair.uCol]||'').trim();if(pk&&pk!=='0')lookupPrimary[pk]=r;
        });
      }
      if(secPair){
        updateRows.forEach(function(r){
          var sk=String(r[secPair.uCol]||'').trim();if(sk&&sk!=='0')lookupSecondary[sk]=r;
        });
      }
      var updated=0,matchedPrimary={},matchedSecondary={};
      workingData.forEach(function(r){
        var src=null;
        if(bestPair){var pk=String(r[bestPair.wCol]||'').trim();if(pk&&lookupPrimary[pk]){src=lookupPrimary[pk];matchedPrimary[pk]=1;}}
        if(!src&&secPair){var sk=String(r[secPair.wCol]||'').trim();if(sk&&lookupSecondary[sk]){src=lookupSecondary[sk];matchedSecondary[sk]=1;}}
        if(src&&mergeRow(r,src))updated++;
      });
      var totalUnmatched=0,seenUpdate={};
      updateRows.forEach(function(r){
        var found=false;
        if(bestPair){var pk=String(r[bestPair.uCol]||'').trim();if(pk&&matchedPrimary[pk])found=true;}
        if(!found&&secPair){var sk=String(r[secPair.uCol]||'').trim();if(sk&&matchedSecondary[sk])found=true;}
        var uid=bestPair?String(r[bestPair.uCol]||'').trim():'';
        if(!uid)uid=JSON.stringify(r).substring(0,60);
        if(!found&&!seenUpdate[uid]){totalUnmatched++;seenUpdate[uid]=1;}
      });
      document.getElementById('updateFileInput').value='';
      showLoading('Rendering dashboard...');
      renderAll();
      loadFromIDB(function(cached){
        if(cached&&cached.rawBuffer)saveToIDB(cached.rawBuffer,workingData,locationMap,cached.fileName,CODE_VERSION);
      });
      fbSaveSharedData(workingData,locationMap,file.name);
      hideLoading();
      var mc='';
      if(bestPair)mc+=bestPair.wCol+' \u2194 '+bestPair.uCol+' ('+bestPair.hits+' hits)';
      if(secPair)mc+=' | '+secPair.wCol+' \u2194 '+secPair.uCol+' ('+secPair.hits+' hits)';
      if(!mc)mc='(no matching columns detected)';
      var sk3=Object.keys(lookupPrimary).slice(0,3).join(', ');
      showUpdateResult({updated:updated,byRef:Object.keys(matchedPrimary).length,byAcct:Object.keys(matchedSecondary).length,unmatched:totalUnmatched,upRows:updateRows.length,wdRows:workingData.length,matchCol:mc,sampleKeys:sk3});
    }catch(err){hideLoading();alert('Update Error: '+err.message);}
    },50);
  };
  reader.readAsArrayBuffer(file);
}
</script>

<script>
function downloadFilteredInvoices(){

    {header:'Doc Date',key:'docDate',width:12},
    {header:'Current',key:'current',width:14},
    {header:'0-30',key:'a030',width:14},
    {header:'31-60',key:'a3160',width:14},
    {header:'61-90',key:'a6190',width:14},
    {header:'91-120',key:'a91120',width:14},
    {header:'120+',key:'a120p',width:14},

  ws.columns=cols;

  headerRow.eachCell(function(cell){

    cell.font={bold:true,color:{argb:'FFFFFFFF'},size:11,name:'Segoe UI'};
    cell.alignment={vertical:'middle',horizontal:'center',wrapText:true};

  });

  var agingBg={8:'FFFFF2CC',9:'FFFFF2CC',10:'FFFFF2CC',11:'FFFFF2CC',12:'FFFCE4D6',13:'FFF8CBAD'};
  var amtCols=[8,9,10,11,12,13];
  
  var sc={"Collected":"FF4CAF50","Paid":"FF4CAF50","Cleared":"FF9E9E9E","Client Pending":"FFFF9800","For Payment":"FF2196F3","Client Unresponsive":"FFf44336","For Cancellation":"FFe91e63","Disputed Invoice":"FF795548","Pending Copy of Contract / SOW":"FF009688","Pending Documents":"FF607D8B","Pending Request":"FFFF5722","CN Issuance":"FF9C27B0","CN not Shared":"FF673AB7","AB Linking":"FF3F51B5","Refuse to Pay":"FFB71C1C","Cancelled":"FF757575"};

  var totals={current:0,a030:0,a3160:0,a6190:0,a91120:0,a120p:0};

  rows.forEach(function(r,i){
    var parseAmt=function(s){return parseFloat(String(s).replace(/,/g,''))||0;};
    var curVal=parseAmt(r.current),a030Val=parseAmt(r.a030),a3160Val=parseAmt(r.a3160),a6190Val=parseAmt(r.a6190),a91120Val=parseAmt(r.a91120),a120pVal=parseAmt(r.a120p);
    totals.current+=curVal;totals.a030+=a030Val;totals.a3160+=a3160Val;totals.a6190+=a6190Val;totals.a91120+=a91120Val;totals.a120p+=a120pVal;

    var row=ws.addRow({
      idx:parseInt(r.idx)||i+1,
      clientNo:r.clientNo,
      name:r.name,
      acctgDoc:r.acctgDoc,
      refDoc:r.refDoc,
      ccy:r.ccy,
      docDate:r.docDate,
      current:curVal!==0?curVal:'',
      a030:a030Val!==0?a030Val:'',
      a3160:a3160Val!==0?a3160Val:'',
      a6190:a6190Val!==0?a6190Val:'',
      a91120:a91120Val!==0?a91120Val:'',
      a120p:a120pVal!==0?a120pVal:'',
      text:r.text,
      pareto:r.pareto,
      status:r.status
    });
    var isEven=i%2===1;
    var rowBg=isEven?'FFFAFAF5':'FFFFFFFF';

    row.eachCell({includeEmpty:true},function(cell,colNumber){
      cell.font={size:10,name:'Segoe UI',color:{argb:'FF333333'}};
      cell.alignment={vertical:'middle'};
      cell.border={top:{style:'thin',color:{argb:'FFEEEEEE'}},bottom:{style:'thin',color:{argb:'FFEEEEEE'}},left:{style:'thin',color:{argb:'FFEEEEEE'}},right:{style:'thin',color:{argb:'FFEEEEEE'}}};

      if(agingBg[colNumber]){
        cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:agingBg[colNumber]}};
      } else {
        cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:rowBg}};
      }

      if(amtCols.indexOf(colNumber)>=0){
        cell.alignment={vertical:'middle',horizontal:'right'};
        cell.numFmt='#,##0.00';
        if(typeof cell.value==='number' && cell.value<0){
          cell.font={size:10,name:'Segoe UI',color:{argb:'FFf44336'}};
        }
      }

      if(colNumber===3) cell.font={size:10,name:'Segoe UI',color:{argb:'FF333333'},bold:true};

      if(colNumber===15){
        var pc=sc[String(cell.value||'')];
        if(pc){
          cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:pc}};
          cell.font={size:10,name:'Segoe UI',color:{argb:'FFFFFFFF'},bold:true};
        }
      }

      if(colNumber===16){
        var stc=sc[String(cell.value||'')];
        if(stc){
          cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:stc}};
          cell.font={size:10,name:'Segoe UI',color:{argb:'FFFFFFFF'},bold:true};
        }
      }
    });
  });

  var gtRow=ws.addRow({idx:'',clientNo:'',name:'Grand Total',acctgDoc:'',refDoc:'',ccy:'',docDate:'',current:totals.current,a030:totals.a030,a3160:totals.a3160,a6190:totals.a6190,a91120:totals.a91120,a120p:totals.a120p,text:'',pareto:'',status:''});
  gtRow.eachCell({includeEmpty:true},function(cell,colNumber){
    cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF9D833E'}};
    cell.font={bold:true,color:{argb:'FFFFFFFF'},size:11,name:'Segoe UI'};
    cell.border={top:{style:'thin',color:{argb:'FF8A7235'}},bottom:{style:'thin',color:{argb:'FF8A7235'}},left:{style:'thin',color:{argb:'FF8A7235'}},right:{style:'thin',color:{argb:'FF8A7235'}}};
    if(amtCols.indexOf(colNumber)>=0){
      cell.numFmt='#,##0.00';
      cell.alignment={vertical:'middle',horizontal:'right'};
    }
  });

  ws.views=[{state:'frozen',ySplit:1}];

  var fname='Accor_Invoices_Export';
  if(typeof currentParetoFilter!=='undefined' && currentParetoFilter) fname+='_'+currentParetoFilter.replace(/[^a-zA-Z0-9]/g,'_');
  if(typeof currentClientFilter!=='undefined' && currentClientFilter) fname+='_'+currentClientFilter.replace(/[^a-zA-Z0-9]/g,'_').substring(0,30);
  var sq=(document.getElementById('invSearch')||{}).value||'';
  if(sq.trim()) fname+='_search';
  fname+='.xlsx';

  wb.xlsx.writeBuffer().then(function(buffer){
    var blob=new Blob([buffer],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url;a.download=fname;
    document.body.appendChild(a);a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });
}
</script>

<script>
/* === AUTO-LOAD: Firebase (shared) first, then IndexedDB fallback === */
(function() {
  var _loaded = false;
  var _lastUploadedAt = 0;

  function applySharedData(fbData, isUpdate) {
    try {
      workingData = JSON.parse(fbData.workingData);
      locationMap = JSON.parse(fbData.locationMap);
      var label = isUpdate ? 'Updated from cloud' : 'Loaded from cloud';
      document.getElementById('fileStatus').innerHTML = '&#9989; ' + esc(fbData.fileName) + ' &mdash; ' + workingData.length + ' rows <span class="cloud-status">&#9729;&#65039; ' + label + '</span>';
      document.getElementById('removeBtn').style.display = 'inline-block';
      document.getElementById('updateBtn').style.display = 'inline-block';
      var li = document.getElementById('liveIndicator'); if (li) li.style.display = 'inline';
      renderAll();
      _loaded = true;
      _lastUploadedAt = fbData.uploadedAt || 0;
    } catch(e) { console.warn('Firebase shared data parse error', e); }
  }

  fbLoadSharedData(function(fbData) {
    if (fbData && fbData.workingData) {
      applySharedData(fbData, false);
      fbListenSharedData(function(updatedData) {
        if (!updatedData || !updatedData.workingData) return;
        if (updatedData.uploadedAt && updatedData.uploadedAt !== _lastUploadedAt) {
          applySharedData(updatedData, true);
        }
      });
    } else {
      loadFromIDB(function(cached) {
        if (_loaded || !cached) return;
        if (cached.codeVersion === CODE_VERSION) {
          try {
            workingData = JSON.parse(cached.workingData);
            locationMap = JSON.parse(cached.locationMap);
            document.getElementById('fileStatus').innerHTML = '&#9989; ' + esc(cached.fileName) + ' &mdash; ' + workingData.length + ' rows (cached)';
            document.getElementById('removeBtn').style.display = 'inline-block';
            document.getElementById('updateBtn').style.display = 'inline-block';
            renderAll();
          } catch(e) { console.warn('Cache restore error', e); }
        } else {
          try {
            var result = parseWorkbook(cached.rawBuffer, cached.fileName);
            if (result) {
              workingData = result.workingData;
              locationMap = result.locationMap;
              saveToIDB(cached.rawBuffer, workingData, locationMap, cached.fileName, CODE_VERSION);
              document.getElementById('fileStatus').innerHTML = '&#9989; ' + esc(cached.fileName) + ' &mdash; ' + workingData.length + ' rows (re-parsed v' + CODE_VERSION + ')';
              document.getElementById('removeBtn').style.display = 'inline-block';
              document.getElementById('updateBtn').style.display = 'inline-block';
              renderAll();
            }
          } catch(e) { console.warn('Cache re-parse error', e); }
        }
      });
      fbListenSharedData(function(newData) {
        if (!newData || !newData.workingData) return;
        applySharedData(newData, false);
      });
    }
  });
})();

function downloadCategoryData(){
  if(typeof ExcelJS==='undefined'){alert('ExcelJS not loaded. Check internet connection.');return;}
  var wb=new ExcelJS.Workbook();
  var ws=wb.addWorksheet('Category Summary');
  var headers=['Row Labels','Current','0-30','31-60','61-90','91-120','120+','Grand Total','Action Items','Action Owner','Timeline','Agency Comments'];
  var headerRow=ws.addRow(headers);
  headerRow.eachCell(function(cell){
    cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF9D833E'}};
    cell.font={bold:true,color:{argb:'FFFFFFFF'},size:11,name:'Segoe UI'};
    cell.alignment={horizontal:'center',vertical:'middle'};
    cell.border={bottom:{style:'thin',color:{argb:'FF9D833E'}}};
  });
  ws.views=[{state:'frozen',ySplit:1}];
  var agingCols={2:'FFFFF2CC',3:'FFFFF2CC',4:'FFFFF2CC',5:'FFFFF2CC',6:'FFFCE4D6',7:'FFF8CBAD'};
  var tbl=document.querySelector('#categoryContent table');
  if(!tbl){alert('No category data to export.');return;}
  var rows=tbl.querySelectorAll('tbody tr');
  var isGrandTotal=false;
  rows.forEach(function(tr){
    if(tr.style.display==='none') return;
    var cells=tr.children;
    if(!cells.length) return;
    isGrandTotal=tr.classList.contains('grand-total');
    var rowData=[];
    for(var i=0;i<cells.length;i++){
      var txt=cells[i].textContent.trim();
      if(i>=1&&i<=7){
        var num=parseFloat(txt.replace(/,/g,''));
        rowData.push(isNaN(num)?txt:num);
      } else {
        rowData.push(txt);
      }
    }
    while(rowData.length<12) rowData.push('');
    var r=ws.addRow(rowData);
    r.eachCell(function(cell,colNumber){
      cell.font={name:'Segoe UI',size:10};
      cell.alignment={vertical:'middle'};
      if(colNumber===1){
        cell.font={name:'Segoe UI',size:10,bold:true};
        cell.alignment={horizontal:'left',vertical:'middle'};
      }
      if(colNumber>=2&&colNumber<=8){
        cell.alignment={horizontal:'right',vertical:'middle'};
        cell.numFmt='#,##0.00';
        if(typeof cell.value==='number'&&cell.value<0){
          cell.font={name:'Segoe UI',size:10,color:{argb:'FFF44336'}};
        }
      }
      if(colNumber>=9){cell.alignment={horizontal:'left',vertical:'middle',wrapText:true};}
      if(agingCols[colNumber]&&!isGrandTotal){
        cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:agingCols[colNumber]}};
      }
      if(isGrandTotal){
        cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF9D833E'}};
        cell.font={name:'Segoe UI',size:10,bold:true,color:{argb:'FFFFFFFF'}};
      }
    });
  });
  ws.columns=[{width:28},{width:15},{width:14},{width:14},{width:14},{width:14},{width:14},{width:18},{width:30},{width:20},{width:18},{width:30}];
  wb.xlsx.writeBuffer().then(function(buffer){
    var blob=new Blob([buffer],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url;a.download='Accor_Category_Export.xlsx';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });
}
</script>
